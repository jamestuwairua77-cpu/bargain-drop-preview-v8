<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Subcategory — Bargain Drop</title>
<style>
:root{--bg:#fff;--fg:#111;--muted:#777;--line:#eee;--red:#e60023}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--fg);padding-bottom:80px}
a{color:inherit;text-decoration:none}
.top-bar{display:flex;align-items:center;justify-content:space-between;padding:6px 16px;background:#111;color:#fff;font-size:0.7rem;position:sticky;top:0;z-index:110}
.top-bar a{color:#fff}
.page-header{padding:16px;border-bottom:1px solid var(--line)}
.page-header h1{font-size:1.1rem;font-weight:800}
.page-header .count{font-size:0.7rem;color:var(--muted);margin-top:4px}
.page-header .breadcrumb{font-size:0.7rem;color:var(--muted);margin-bottom:6px}
.page-header .breadcrumb a{color:var(--muted);text-decoration:underline}
.product-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding:16px}
.product-card{background:#fff;border-radius:12px;overflow:hidden;border:1px solid var(--line);transition:all .15s}
.product-card:hover{box-shadow:0 3px 16px rgba(0,0,0,.08);transform:translateY(-2px)}
.prod-img{aspect-ratio:1;background:#f5f5f5;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative}
.prod-img img{width:100%;height:100%;object-fit:cover}
.prod-badge{position:absolute;top:8px;left:8px;background:var(--red);color:#fff;font-size:0.58rem;font-weight:700;padding:3px 8px;border-radius:4px}
.prod-info{padding:8px 10px 10px}
.prod-title{font-size:0.72rem;font-weight:600;line-height:1.3;overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;margin-bottom:4px}
.prod-price-row{display:flex;align-items:center;gap:6px}
.prod-price{font-size:0.85rem;font-weight:800;color:var(--red)}
.prod-compare{font-size:0.62rem;color:var(--muted);text-decoration:line-through}
.prod-discount{font-size:0.58rem;color:#10b981;font-weight:600}
.loading{text-align:center;padding:60px;color:var(--muted)}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--line);display:flex;z-index:120;padding:4px 0}
.bottom-nav a{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:5px;font-size:0.6rem;color:var(--muted);text-decoration:none}
.bottom-nav a.active,.bottom-nav a:hover{color:var(--fg)}
.nav-icon{width:20px;height:20px;flex-shrink:0}
@media(min-width:768px){.product-grid{grid-template-columns:repeat(4,1fr);max-width:960px;margin:0 auto}}
</style>
</head>
<body>
<div class="top-bar"><a href="categories.html">← Categories</a><div>Free $29+</div></div>
<div id="loading" class="loading"><div style="width:28px;height:28px;border:3px solid #e5e5e5;border-top-color:#111;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 12px"></div><p>Loading...</p></div>
<div id="content" style="display:none">
<div class="page-header"><div class="breadcrumb" id="breadcrumb"></div><h1 id="title"></h1><div class="count" id="count"></div></div>
<div class="product-grid" id="grid"></div>
</div>
<nav class="bottom-nav">
<a href="/"><svg class="nav-icon" viewBox="0 0 24 24"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3" stroke="#777" stroke-width="2" fill="none"/></svg>Home</a>
<a href="products.html"><svg class="nav-icon" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1" stroke="#777" stroke-width="1.5" fill="none"/></svg>Products</a>
<a href="categories.html"><svg class="nav-icon" viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h16" stroke="#777" stroke-width="2"/></svg>Categories</a>
<a href="profile.html"><svg class="nav-icon" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2" stroke="#777" stroke-width="2"/><circle cx="12" cy="7" r="4" stroke="#777" stroke-width="2"/></svg>Me</a>
</nav>
<script>
async function load(){
var p=new URLSearchParams(location.search);var handle=p.get('handle');var cat=p.get('cat');
if(!handle){document.getElementById('loading').innerHTML='<p>No subcategory specified</p>';return}
try{var r=await fetch('categories-data.json');var d=await r.json();
var found=[];var parentCat='';Object.entries(d).forEach(function(e){var c=e[1];(c.subcategories||[]).forEach(function(s){if(s.handle===handle){parentCat=e[0];if(c.products)c.products.forEach(function(p){if(p.subcategory===s.title||p.subcategory===s.handle||s.title.indexOf(p.subcategory)>=0)found.push(p)})}})});
if(found.length===0){document.getElementById('loading').innerHTML='<p>No products in this subcategory</p>';return}
document.getElementById('loading').style.display='none';document.getElementById('content').style.display='block';
document.getElementById('breadcrumb').innerHTML='<a href="/">Home</a> → <a href="categories.html">Categories</a>'+(parentCat?' → <a href="category.html?cat='+encodeURIComponent(parentCat)+'">'+esc(parentCat)+'</a>':'');
var title=handle.replace(/-/g,' ').replace(/\b\w/g,function(l){return l.toUpperCase()});
document.getElementById('title').textContent=title;
document.getElementById('count').textContent=found.length+' products';
var g=document.getElementById('grid');
found.forEach(function(p){var d=p.compare_at_price&&p.price?Math.round((1-p.price/p.compare_at_price)*100):0;var b=d>=40?'<div class="prod-badge">-'+d+'%</div>':'';var img=p.image?'<img src="'+p.image+'" loading="lazy">':'';var c=document.createElement('a');c.className='product-card';c.href='product.html?id='+p.id;c.innerHTML='<div class="prod-img">'+b+img+'</div><div class="prod-info"><div class="prod-title">'+esc(p.title)+'</div><div class="prod-price-row"><span class="prod-price">$'+(p.price||0).toFixed(2)+'</span>'+(p.compare_at_price?'<span class="prod-compare">$'+p.compare_at_price.toFixed(2)+'</span>':'')+(d?'<span class="prod-discount">-'+d+'%</span>':'')+'</div></div>';g.appendChild(c)})
}catch(e){document.getElementById('loading').innerHTML='<p>Error: '+e.message+'</p>'}
}
function esc(t){return(t||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
load();
</script>
</body>
</html>
