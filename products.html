<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Products — Bargain Drop</title>
<style>
:root{--bg:#fff;--fg:#111;--muted:#777;--line:#eee;--red:#e60023;--accent:#ff2d55}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--fg);padding-bottom:80px}
a{color:inherit;text-decoration:none}
.top-bar{display:flex;align-items:center;justify-content:space-between;padding:6px 16px;background:#111;color:#fff;font-size:0.7rem;position:sticky;top:0;z-index:110}
.top-bar a{color:#fff}
.page-header{padding:16px;border-bottom:1px solid var(--line)}
.page-header h1{font-size:1.1rem;font-weight:800}
.page-header .count{font-size:0.7rem;color:var(--muted)}
.search-bar{padding:8px 16px;display:flex;gap:8px}
.search-bar input{flex:1;padding:10px 14px;border:1.5px solid var(--line);border-radius:10px;font-size:0.78rem;outline:none}
.search-bar input:focus{border-color:var(--accent)}
.product-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding:16px}
.product-card{background:#fff;border-radius:12px;overflow:hidden;border:1px solid var(--line);transition:all .15s}
.product-card:hover{box-shadow:0 3px 16px rgba(0,0,0,.08);transform:translateY(-2px)}
.prod-img{aspect-ratio:1;background:#f5f5f5;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative}
.prod-img img{width:100%;height:100%;object-fit:cover}
.prod-badge{position:absolute;top:8px;left:8px;background:var(--red);color:#fff;font-size:0.58rem;font-weight:700;padding:3px 8px;border-radius:4px}
.prod-info{padding:8px 10px 10px}
.prod-title{font-size:0.72rem;font-weight:600;line-height:1.3;overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;margin-bottom:4px}
.prod-price-row{display:flex;align-items:center;gap:6px}
.prod-price{font-size:0.85rem;font-weight:800;color:var(--red)}
.prod-compare{font-size:0.62rem;color:var(--muted);text-decoration:line-through}
.prod-discount{font-size:0.58rem;color:#10b981;font-weight:600}
.prod-cat{font-size:0.6rem;color:var(--muted);margin-top:2px}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--line);display:flex;z-index:120;padding:4px 0}
.bottom-nav a{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:5px;font-size:0.6rem;color:var(--muted);text-decoration:none}
.bottom-nav a.active,.bottom-nav a:hover{color:var(--fg)}
.nav-icon{width:20px;height:20px;flex-shrink:0}
.loading{text-align:center;padding:60px;color:var(--muted)}
@media(min-width:768px){.product-grid{grid-template-columns:repeat(4,1fr);max-width:960px;margin:0 auto}}
</style>
</head>
<body>
<div class="top-bar"><a href="/">← Home</a><div>Free Shipping $29+</div></div>
<div class="page-header"><h1>All Products</h1><div class="count" id="count">Loading...</div></div>
<div class="search-bar">
  <input type="text" id="search" placeholder="Search products..." oninput="filter()">
</div>
<div class="product-grid" id="grid"><div class="loading"><p>Loading products...</p></div></div>
<nav class="bottom-nav">
  <a href="/"><svg class="nav-icon" viewBox="0 0 24 24"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3" stroke="#777" stroke-width="2" fill="none"/></svg>Home</a>
  <a href="products.html" class="active"><svg class="nav-icon" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1" stroke="#111" stroke-width="1.5" fill="none"/><rect x="14" y="3" width="7" height="7" rx="1" stroke="#111" stroke-width="1.5" fill="none"/></svg>Products</a>
  <a href="categories.html"><svg class="nav-icon" viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h16" stroke="#777" stroke-width="2"/></svg>Categories</a>
  <a href="#"><svg class="nav-icon" viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z" stroke="#777" stroke-width="1.5" fill="none"/></svg>Wishlist</a>
  <a href="profile.html"><svg class="nav-icon" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2" stroke="#777" stroke-width="2" fill="none"/><circle cx="12" cy="7" r="4" stroke="#777" stroke-width="2" fill="none"/></svg>Me</a>
</nav>
<script>
var all=[];
fetch('categories-data.json').then(r=>r.json()).then(data=>{
  Object.entries(data).forEach(e=>{var c=e[0];(e[1].products||[]).forEach(p=>{p.category=c;all.push(p)})});
  document.getElementById('count').textContent=all.length+' products';
  render(all);
}).catch(()=>document.getElementById('grid').innerHTML='<p class="loading">Failed to load products</p>');
function render(list){
  var g=document.getElementById('grid');g.innerHTML='';
  if(!list.length){g.innerHTML='<p class="loading">No products found</p>';return}
  list.forEach(p=>{
    var d=p.compare_at_price&&p.price?Math.round((1-p.price/p.compare_at_price)*100):0;
    var b=d>=40?'<div class="prod-badge">-'+d+'%</div>':'';
    var img=p.image?'<img src="'+p.image+'" loading="lazy">':'<span style="font-size:2rem;color:#ccc"></span>';
    var c=document.createElement('a');c.className='product-card';c.href='product.html?id='+p.id;
    c.innerHTML='<div class="prod-img">'+b+img+'</div><div class="prod-info"><div class="prod-title">'+esc(p.title)+'</div><div class="prod-cat">'+esc(p.category||'')+'</div><div class="prod-price-row"><span class="prod-price">$'+(p.price||0).toFixed(2)+'</span>'+(p.compare_at_price?'<span class="prod-compare">$'+p.compare_at_price.toFixed(2)+'</span>':'')+(d?'<span class="prod-discount">-'+d+'%</span>':'')+'</div></div>';
    g.appendChild(c);
  });
}
function esc(t){return(t||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function filter(){var q=document.getElementById('search').value.toLowerCase();render(all.filter(p=>p.title.toLowerCase().includes(q)||(p.category||'').toLowerCase().includes(q)))}
</script>
</body>
</html>
