<!doctype html><html lang=en><head><meta charset=UTF-8><meta name=viewport content='width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no'><title>Review Orders — Bargain Drop</title><style>:root{--bg:#fff;--fg:#111;--muted:#777;--line:#eee;--purple:#8b5cf6}*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,sans-serif;background:#f8f8f8;color:var(--fg);padding-bottom:80px}.header{display:flex;align-items:center;justify-content:space-between;padding:8px 14px;background:#fff;border-bottom:1px solid var(--line);position:sticky;top:0;z-index:100}.logo{display:flex;align-items:center;gap:6px;text-decoration:none}.logo-text{font-size:1.15rem;font-weight:900}.logo-text .bd-b{background:linear-gradient(135deg,#e60023,#ff4757);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}.logo-text .bd-d{color:#111}.logo-icon{width:24px;height:24px;border-radius:6px;background:linear-gradient(135deg,#e60023,#ff6b81);display:flex;align-items:center;justify-content:center;color:#fff;font-size:.65rem;font-weight:900;flex-shrink:0}.back-link{display:flex;align-items:center;gap:4px;color:var(--purple);font-size:.75rem;font-weight:600;text-decoration:none;padding:14px 14px 0}.page-content{padding:16px;max-width:700px;margin:0 auto}.page-title{font-size:1.1rem;font-weight:800;margin-bottom:6px;display:flex;align-items:center;gap:8px}.page-subtitle{font-size:.7rem;color:var(--muted);margin-bottom:16px}.order-card{background:#fff;border-radius:12px;border:1.5px solid var(--line);padding:16px;margin-bottom:10px}.order-card-header{display:flex;justify-content:space-between;margin-bottom:8px}.order-id{font-size:.7rem;font-weight:700;color:var(--muted)}.order-status{font-size:.62rem;font-weight:700;padding:3px 8px;border-radius:6px;background:#ede9fe;color:var(--purple)}.order-items{font-size:.72rem;margin-bottom:8px;color:var(--muted)}.stars{display:flex;gap:4px;margin-bottom:8px}.stars button{background:0 0;border:none;font-size:1.5rem;cursor:pointer;transition:transform .1s}.stars button:hover{transform:scale(1.2)}.stars button.active{filter:grayscale(0)}.stars button.inactive{filter:grayscale(1);opacity:.4}.rate-btn{display:inline-block;margin-top:4px;padding:6px 14px;background:var(--purple);color:#fff;border:none;border-radius:8px;font-size:.65rem;font-weight:700;cursor:pointer}.empty-state{text-align:center;padding:60px 20px;color:var(--muted)}.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--line);display:flex;z-index:120;padding:4px 0 env(safe-area-inset-bottom,0)}.bottom-nav a{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:5px;font-size:.58rem;color:var(--muted);text-decoration:none}.nav-icon{width:20px;height:20px}</style></head><body><div class=header><a href=/ class=logo><div class=logo-icon>BD</div><span class=logo-text><span class=bd-b>BARGAIN</span><span class=bd-d>DROP</span></span></a></div><a href=profile.html class=back-link>← Back to Profile</a><div class=page-content><div class=page-title>⭐ Review Orders</div><div class=page-subtitle>Rate items you received</div><div id=orders-list></div></div><nav class=bottom-nav><a href=/><svg class=nav-icon viewBox='0 0 24 24'><path d='M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3' stroke=#777 stroke-width=2 fill=none/></svg>Home</a><a href=products.html><svg class=nav-icon viewBox='0 0 24 24'><rect x=3 y=3 width=7 height=7 rx=1 stroke=#777 stroke-width=1.5 fill=none/><rect x=14 y=3 width=7 height=7 rx=1 stroke=#777 stroke-width=1.5 fill=none/><rect x=3 y=14 width=7 height=7 rx=1 stroke=#777 stroke-width=1.5 fill=none/><rect x=14 y=14 width=7 height=7 rx=1 stroke=#777 stroke-width=1.5 fill=none/></svg>Products</a><a href=categories.html><svg class=nav-icon viewBox='0 0 24 24'><path d='M4 6h16M4 12h16M4 18h16' stroke=#777 stroke-width=2/></svg>Shop</a><a href=profile.html><svg class=nav-icon viewBox='0 0 24 24'><path d='M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2' stroke=#777 stroke-width=2 fill=none/><circle cx=12 cy=7 r=4 stroke=#777 stroke-width=2 fill=none/></svg>Me</a></nav><script>var orders=JSON.parse(localStorage.getItem('bd_orders')||'[]');var filtered=orders.filter(function(o){return o.status==='delivered'||o.status==='shipped'});var el=document.getElementById('orders-list');if(filtered.length===0){el.innerHTML='<div class=empty-state><p style=font-size:3rem>⭐</p><p>No orders to review</p><p style=font-size:.7rem;color:var(--muted);margin-top:6px>Delivered orders will appear here for review</p></div>'}else{var h='';for(var i=0;i<filtered.length;i++){var o=filtered[i];h+='<div class=order-card><div class=order-card-header><span class=order-id>Order #'+o.id+'</span><span class=order-status>Delivered</span></div><div class=order-items>'+o.count+' item(s) · $'+(o.total||0).toFixed(2)+'</div><div class=stars id=stars-'+i+'>'+[1,2,3,4,5].map(function(s){return '<button onclick=rate('+i+','+s+') id=star-'+i+'-'+s+' class=inactive>☆</button>'}).join('')+'</div><button class=rate-btn onclick=submitRate('+i+')>Submit Rating</button></div>'}el.innerHTML=h;window.ratings=window.ratings||{}}
function rate(oi,s){window.ratings[oi]=s;for(var j=1;j<=5;j++){var btn=document.getElementById('star-'+oi+'-'+j);if(btn){btn.textContent=j<=s?'★':'☆';btn.className=j<=s?'active':'inactive'}}}
function submitRate(oi){var r=window.ratings[oi];if(!r){alert('Please select a rating first');return}alert('Thank you for your '+r+'-star rating!')}</script></body></html>
