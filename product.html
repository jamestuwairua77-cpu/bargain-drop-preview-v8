<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Product — Bargain Drop</title>
<style>
:root{--bg:#fff;--fg:#111;--muted:#777;--line:#eee;--red:#e60023;--green:#10b981}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#f8f8f8;color:var(--fg);padding-bottom:80px}
.header{display:flex;align-items:center;justify-content:space-between;padding:8px 14px;background:#fff;border-bottom:1px solid var(--line);position:sticky;top:0;z-index:100}
.logo{display:flex;align-items:center;gap:6px;text-decoration:none}
.logo-text{font-size:1.15rem;font-weight:900}.logo-text .bd-b{background:linear-gradient(135deg,#e60023,#ff4757);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}.logo-text .bd-d{color:#111}
.logo-icon{width:24px;height:24px;border-radius:6px;background:linear-gradient(135deg,#e60023,#ff6b81);display:flex;align-items:center;justify-content:center;color:#fff;font-size:.65rem;font-weight:900;flex-shrink:0}
.header-actions{display:flex;align-items:center;gap:12px}.header-actions a{display:flex;align-items:center;color:inherit;text-decoration:none}
.cart-btn{position:relative}.cart-count{position:absolute;top:-6px;right:-8px;background:var(--red);color:#fff;font-size:.52rem;min-width:17px;height:17px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700}
.product-main{padding:0;max-width:800px;margin:0 auto}
.product-gallery{width:100%;aspect-ratio:1;background:#f5f5f5;display:flex;align-items:center;justify-content:center}
.product-gallery img{width:100%;height:100%;object-fit:contain}
.product-details{padding:16px}
.product-title-detail{font-size:.95rem;font-weight:800;line-height:1.3;margin-bottom:8px}
.product-price-detail{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.product-price-detail .sale{font-size:1.3rem;font-weight:900;color:var(--red)}
.product-price-detail .original{font-size:.8rem;color:var(--muted);text-decoration:line-through}
.product-price-detail .discount{font-size:.7rem;background:#fce4e4;color:var(--red);padding:3px 8px;border-radius:4px;font-weight:700}
.product-rating{display:flex;align-items:center;gap:4px;font-size:.7rem;color:var(--muted);margin-bottom:12px}
.product-rating .stars{color:#f59e0b}
.divider{height:1px;background:var(--line);margin:12px 0}
.product-desc{font-size:.7rem;color:var(--muted);line-height:1.6;margin-bottom:12px}
.product-desc ul{padding-left:16px}
.product-desc li{margin-bottom:4px}
.actions-sticky{position:sticky;bottom:0;background:#fff;padding:14px;border-top:1px solid var(--line);display:flex;gap:10px;z-index:50}
.qty-selector{display:flex;align-items:center;border:1.5px solid var(--line);border-radius:10px;overflow:hidden}
.qty-selector button{width:36px;height:40px;border:none;background:#f8f8f8;font-size:1rem;font-weight:700;cursor:pointer}
.qty-selector span{width:44px;text-align:center;font-weight:700;font-size:.85rem}
.add-cart-main{flex:1;padding:12px;background:#111;color:#fff;border:none;border-radius:10px;font-size:.78rem;font-weight:700;cursor:pointer}
.buy-now{flex:1;padding:12px;background:linear-gradient(135deg,#e60023,#ff4757);color:#fff;border:none;border-radius:10px;font-size:.78rem;font-weight:700;cursor:pointer}
.add-cart-main:active,.buy-now:active{opacity:.85}
.related-section{padding:16px}.related-title{font-size:.85rem;font-weight:800;margin-bottom:10px}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--line);display:flex;z-index:120;padding:4px 0 env(safe-area-inset-bottom,0)}.bottom-nav a{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:5px;font-size:.58rem;color:var(--muted);text-decoration:none}.nav-icon{width:20px;height:20px}
</style>
</head>
<body>
<div class="header">
<a href="/" class="logo"><div class="logo-icon">BD</div><span class="logo-text"><span class="bd-b">BARGAIN</span><span class="bd-d">DROP</span></span></a>
<div class="header-actions"><a href="cart.html" class="cart-btn"><svg width="22" height="22" viewBox="0 0 24 24"><circle cx="9" cy="21" r="1" fill="#555"/><circle cx="20" cy="21" r="1" fill="#555"/><path d="M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 002-1.61L23 6H6" stroke="#555" stroke-width="1.8" fill="none"/></svg><span class="cart-count" id="cart-count">0</span></a></div>
</div>
<div class="product-main">
<div class="product-gallery"><img id="product-img" src="https://via.placeholder.com/400?text=BD" alt="Product"></div>
<div class="product-details">
<div class="product-title-detail" id="product-title">Loading...</div>
<div class="product-rating" id="product-rating"><span class="stars">★★★★☆</span> 4.2 (128 reviews)</div>
<div class="product-price-detail"><span class="sale" id="product-price">$0.00</span><span class="original" id="product-original"></span><span class="discount" id="product-discount"></span></div>
<div class="product-desc" id="product-desc">Loading description...</div>
</div>
<div class="actions-sticky">
<div class="qty-selector"><button onclick="chgQty(-1)">−</button><span id="qty-val">1</span><button onclick="chgQty(1)">+</button></div>
<button class="add-cart-main" onclick="addToCart()">Add to Cart</button>
<button class="buy-now" onclick="buyNow()">Buy Now</button>
</div>
</div>
<nav class="bottom-nav">
<a href="/"><svg class="nav-icon" viewBox="0 0 24 24"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3" stroke="#777" stroke-width="2" fill="none"/></svg>Home</a>
<a href="products.html"><svg class="nav-icon" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1" stroke="#777" stroke-width="1.5" fill="none"/><rect x="14" y="3" width="7" height="7" rx="1" stroke="#777" stroke-width="1.5" fill="none"/><rect x="3" y="14" width="7" height="7" rx="1" stroke="#777" stroke-width="1.5" fill="none"/><rect x="14" y="14" width="7" height="7" rx="1" stroke="#777" stroke-width="1.5" fill="none"/></svg>Products</a>
<a href="categories.html"><svg class="nav-icon" viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h16" stroke="#777" stroke-width="2"/></svg>Shop</a>
<a href="profile.html"><svg class="nav-icon" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2" stroke="#777" stroke-width="2" fill="none"/><circle cx="12" cy="7" r="4" stroke="#777" stroke-width="2" fill="none"/></svg>Me</a>
</nav>
<script>
function updateCartCount(){var c=JSON.parse(localStorage.getItem('bd_cart')||'[]');var el=document.getElementById('cart-count');if(el)el.textContent=c.reduce(function(s,i){return s+(i.qty||1)},0)}
var qty=1;var product=null;
function chgQty(d){qty=Math.max(1,qty+d);document.getElementById('qty-val').textContent=qty}
var params=new URLSearchParams(location.search);var pid=params.get('id');
var products=JSON.parse(localStorage.getItem('bd_v8_products')||'[]');
product=products.find(function(p){return p.id===pid});
if(!product&&products.length>0)product=products[0];
if(product){
document.getElementById('product-title').textContent=product.title;
document.getElementById('product-price').textContent='$'+(product.price||0).toFixed(2);
if(product.image)document.getElementById('product-img').src=product.image;
if(product.compare_at_price && product.compare_at_price>product.price){
document.getElementById('product-original').textContent='$'+product.compare_at_price.toFixed(2);
document.getElementById('product-discount').textContent=Math.round((1-product.price/product.compare_at_price)*100)+'% OFF';
}else{document.getElementById('product-original').style.display='none';document.getElementById('product-discount').style.display='none'}
var desc=product.body_html||product.description||'';
if(desc){document.getElementById('product-desc').innerHTML='<ul><li>'+desc.replace(/<[^>]*>/g,'').split(/[.;]/).filter(function(s){return s.trim()}).join('</li><li>')+'</li></ul>'}
else{document.getElementById('product-desc').textContent='High-quality product from Bargain Drop. Fast shipping and great value.'}
}
function addToCart(){if(!product)return;var cart=JSON.parse(localStorage.getItem('bd_cart')||'[]');var ex=cart.find(function(x){return x.id===product.id});if(ex){ex.qty+=qty}else{cart.push({id:product.id,title:product.title,price:product.price,image:product.image,qty:qty})}localStorage.setItem('bd_cart',JSON.stringify(cart));updateCartCount();alert('Added '+qty+' item(s) to cart!')}
function buyNow(){addToCart();location.href='checkout.html'}
updateCartCount();
</script>
</body>
</html>
