<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Product — Bargain Drop</title>
<style>
:root{--bg:#fff;--fg:#111;--muted:#777;--line:#eee;--accent:#111;--red:#e60023;--green:#10b981}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--fg);padding-bottom:80px}
a{color:inherit;text-decoration:none}
img{max-width:100%;height:auto;display:block}
.top-bar{display:flex;align-items:center;justify-content:space-between;padding:6px 16px;background:#111;color:#fff;font-size:0.7rem;position:sticky;top:0;z-index:110}
.top-bar a{color:#fff}
.back-btn{display:flex;align-items:center;gap:4px;font-size:0.78rem;cursor:pointer;font-weight:600}
.product-hero{position:relative;background:#f8f8f8}
.product-hero img{width:100%;max-height:420px;object-fit:contain;margin:0 auto}
.no-image{display:flex;align-items:center;justify-content:center;aspect-ratio:1;font-size:6rem;color:#ddd;max-height:420px}
.product-info{padding:16px}
.product-info h1{font-size:1rem;font-weight:800;line-height:1.3;margin-bottom:10px}
.price-row{display:flex;align-items:baseline;gap:10px;margin-bottom:14px}
.price{font-size:1.3rem;font-weight:900;color:var(--red)}
.compare-price{font-size:0.85rem;color:var(--muted);text-decoration:line-through}
.save-badge{font-size:0.65rem;background:#fef2f2;color:var(--red);padding:3px 8px;border-radius:8px;font-weight:600}
.action-row{display:flex;gap:8px;margin-bottom:20px}
.btn{flex:1;padding:14px;border-radius:10px;font-size:0.78rem;font-weight:700;cursor:pointer;border:none;transition:all .15s;text-align:center}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{opacity:.92;transform:translateY(-1px)}
.btn-outline{background:#fff;border:1.5px solid var(--line);color:var(--fg)}
.btn-outline:hover{background:#f5f5f5}
.section{padding:0 16px 16px}
.section h3{font-size:0.82rem;font-weight:700;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--line)}
.desc-list{list-style:none;padding:0}
.desc-list li{font-size:0.74rem;line-height:1.7;color:#444;padding:4px 0;border-bottom:1px solid #f9f9f9}
.desc-list li::before{content:'• ';color:var(--accent);font-weight:700}
.desc-list li b,.desc-list li strong{color:var(--fg);font-weight:700}
.prod-meta{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.meta-tag{padding:5px 10px;background:#f5f5f5;border-radius:6px;font-size:0.68rem;color:var(--muted)}
.related-section{padding:16px}
.related-section h3{font-size:0.82rem;font-weight:700;margin-bottom:10px}
.related-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.related-card{background:#fff;border-radius:12px;overflow:hidden;border:1px solid var(--line);transition:0.15s}
.related-card:hover{box-shadow:0 2px 12px rgba(0,0,0,0.08)}
.related-card .rimg{aspect-ratio:1;background:#f5f5f5;display:flex;align-items:center;justify-content:center;overflow:hidden}
.related-card .rimg img{width:100%;height:100%;object-fit:cover}
.related-card .rinfo{padding:8px 10px 10px}
.related-card .rtitle{font-size:0.7rem;font-weight:600;line-height:1.3;overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;margin-bottom:4px}
.related-card .rprice{font-size:0.8rem;font-weight:800;color:var(--red)}
.loading{display:flex;align-items:center;justify-content:center;padding:80px 20px;color:var(--muted);flex-direction:column;gap:12px}
.spinner{width:32px;height:32px;border:3px solid #e5e5e5;border-top-color:#111;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--line);display:flex;z-index:120;padding:4px 0}
.bottom-nav a{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:5px;font-size:0.6rem;color:var(--muted);text-decoration:none}
.bottom-nav a.active{color:var(--fg)}
.nav-icon{width:20px;height:20px;flex-shrink:0}
@media(min-width:768px){.product-hero img{max-height:520px}.product-info,.section,.related-section{max-width:720px;margin-left:auto;margin-right:auto}.related-grid{grid-template-columns:repeat(4,1fr)}}
</style>
</head>
<body>
<div class="top-bar"><a href="javascript:history.back()" class="back-btn">← Back</a><div>Free $29+</div></div>
<div id="loading" class="loading"><div class="spinner"></div><p>Loading product...</p></div>
<div id="content" style="display:none">
<div class="product-hero" id="hero"></div>
<div class="product-info"><h1 id="title"></h1><div class="price-row"><span class="price" id="price"></span><span class="compare-price" id="compare"></span><span class="save-badge" id="save-badge" style="display:none"></span></div>
<div class="action-row"><button class="btn btn-primary" onclick="addToCart()"> Add to Cart</button><button class="btn btn-outline" onclick="addToCart()"> Buy Now</button></div></div>
<div class="section"><h3>Product Details</h3><ul class="desc-list" id="desc-list"></ul></div>
<div class="section"><h3>Category</h3><div class="prod-meta" id="meta"></div></div>
<div class="related-section" id="related-section" style="display:none"><h3>You May Also Like</h3><div class="related-grid" id="related-grid"></div></div>
</div>
<nav class="bottom-nav">
<a href="index.html"><svg class="nav-icon" viewBox="0 0 24 24"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3" stroke="#777" stroke-width="2" fill="none"/></svg>Home</a>
<a href="products.html"><svg class="nav-icon" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1" stroke="#777" stroke-width="1.5" fill="none"/><rect x="14" y="3" width="7" height="7" rx="1" stroke="#777" stroke-width="1.5" fill="none"/></svg>Products</a>
<a href="categories.html"><svg class="nav-icon" viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h16" stroke="#777" stroke-width="2"/></svg>Categories</a>
<a href="#"><svg class="nav-icon" viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z" stroke="#777" stroke-width="1.5" fill="none"/></svg>Wishlist</a>
<a href="profile.html"><svg class="nav-icon" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2" stroke="#777" stroke-width="2" fill="none"/><circle cx="12" cy="7" r="4" stroke="#777" stroke-width="2" fill="none"/></svg>Me</a>
</nav>
<script>
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
async function load(){
var p=new URLSearchParams(window.location.search),id=p.get('id');
if(!id){document.getElementById('loading').innerHTML='<div style="text-align:center;padding:60px"><p>No product specified</p></div>';return}
try{
var r=await fetch('categories-data.json'),data=await r.json();
var prod=null,catName='';
for(var c in data){
var found=(data[c].products||[]).find(function(x){return String(x.id)===String(id)});
if(found){prod=found;catName=c;break}
}
if(!prod){throw new Error('Product not found in any category')}
document.getElementById('loading').style.display='none';
document.getElementById('content').style.display='block';
document.title=prod.title+' — Bargain Drop';
var img=prod.image?'<img src="'+prod.image+'" alt="" onerror="this.parentElement.innerHTML=\'<div class=no-image>📦</div>\'">':'<div class="no-image">📦</div>';
document.getElementById('hero').innerHTML=img;
document.getElementById('title').textContent=prod.title;
document.getElementById('price').textContent='$'+(prod.price||0).toFixed(2);
if(prod.compare_at_price&&prod.compare_at_price>prod.price){
document.getElementById('compare').textContent='$'+Number(prod.compare_at_price).toFixed(2);
var pct=Math.round((1-prod.price/prod.compare_at_price)*100);
document.getElementById('save-badge').textContent='Save '+pct+'%';
document.getElementById('save-badge').style.display='inline';
}
var descParts=buildDesc(prod);
var dl=document.getElementById('desc-list');
descParts.forEach(function(d){dl.innerHTML+='<li>'+d+'</li>'});
document.getElementById('meta').innerHTML='<span class="meta-tag">'+esc(catName)+'</span><span class="meta-tag">SKU: '+(prod.sku||prod.handle||id)+'</span>';
if(prod.tags){var tags=Array.isArray(prod.tags)?prod.tags:prod.tags.split(',');tags.forEach(function(t){document.getElementById('meta').innerHTML+='<span class="meta-tag">'+esc(t.trim())+'</span>'})}
var related=(data[catName]&&data[catName].products||[]).filter(function(x){return String(x.id)!==String(id)}).slice(0,4);
if(related.length>0){
document.getElementById('related-section').style.display='block';
var rg=document.getElementById('related-grid');
related.forEach(function(rp){
var ri=rp.image?'<img src="'+rp.image+'" alt="" loading="lazy">':'';
rg.innerHTML+='<a href="product.html?id='+rp.id+'" class="related-card"><div class="rimg">'+ri+'</div><div class="rinfo"><div class="rtitle">'+esc(rp.title)+'</div><div class="rprice">$'+(rp.price||0).toFixed(2)+'</div></div></a>'
})
}
}catch(e){
document.getElementById('loading').innerHTML='<div style="text-align:center;padding:60px"><p>'+e.message+'</p><br><a href="products.html">← Back to Products</a></div>'
}
}
function buildDesc(p){
var parts=[];
if(p.body_html){
var div=document.createElement('div');div.innerHTML=p.body_html;
var text=div.textContent||div.innerText||'';
var lines=text.split(/[\n•·▪▸]/).filter(Boolean);
lines.forEach(function(l){l=l.trim();if(l)parts.push(l)})
}
if(parts.length===0){
if(p.vendor)parts.push('<b>Brand:</b> '+esc(p.vendor));
if(p.product_type)parts.push('<b>Type:</b> '+esc(p.product_type));
parts.push('<b>Quality:</b> Premium-grade materials with careful craftsmanship');
parts.push('<b>Design:</b> Modern aesthetic — perfect for everyday wear or gifting');
parts.push('<b>Care:</b> Easy to maintain, store in original packaging');
parts.push('<b>Satisfaction:</b> Backed by our 30-day return policy');
}
return parts.slice(0,12)
}
function addToCart(){alert('Added to cart! (Demo)')}
load();
</script>
</body>
</html>
