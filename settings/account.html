<!doctype html><html lang=en><head><meta charset=UTF-8><meta name=viewport content='width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no'><title>Manage Account — Bargain Drop</title><style>:root{--bg:#fff;--fg:#111;--muted:#777;--line:#eee;--purple:#8b5cf6}*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,sans-serif;background:#f8f8f8;color:var(--fg);padding-bottom:80px}.header{display:flex;align-items:center;justify-content:space-between;padding:8px 14px;background:#fff;border-bottom:1px solid var(--line);position:sticky;top:0;z-index:100}.logo{display:flex;align-items:center;gap:6px;text-decoration:none}.logo-text{font-size:1.15rem;font-weight:900}.logo-text .bd-b{background:linear-gradient(135deg,#e60023,#ff4757);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}.logo-text .bd-d{color:#111}.logo-icon{width:24px;height:24px;border-radius:6px;background:linear-gradient(135deg,#e60023,#ff6b81);display:flex;align-items:center;justify-content:center;color:#fff;font-size:.65rem;font-weight:900;flex-shrink:0}.back-link{display:flex;align-items:center;gap:4px;color:var(--purple);font-size:.75rem;font-weight:600;text-decoration:none;padding:14px 14px 0}.page-content{padding:16px;max-width:700px;margin:0 auto}.page-title{font-size:1.1rem;font-weight:800;margin-bottom:16px}.form-card{background:#fff;border-radius:14px;border:1.5px solid var(--line);padding:18px}.form-group{margin-bottom:14px}.form-group label{display:block;font-size:.65rem;font-weight:700;margin-bottom:4px;color:var(--muted)}.form-group input{width:100%;padding:10px 12px;border:1.5px solid var(--line);border-radius:8px;font-size:.72rem;outline:none}.save-btn{width:100%;padding:12px;background:#111;color:#fff;border:none;border-radius:10px;font-size:.78rem;font-weight:700;cursor:pointer}.danger-zone{margin-top:20px;padding-top:16px;border-top:1px solid var(--line)}.danger-zone h3{font-size:.75rem;color:var(--muted);margin-bottom:8px}.delete-btn{padding:8px 16px;background:#fff;color:#e60023;border:1.5px solid #e60023;border-radius:8px;font-size:.68rem;font-weight:700;cursor:pointer}.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--line);display:flex;z-index:120;padding:4px 0 env(safe-area-inset-bottom,0)}.bottom-nav a{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:5px;font-size:.58rem;color:var(--muted);text-decoration:none}.nav-icon{width:20px;height:20px}</style></head><body><div class=header><a href=/ class=logo><div class=logo-icon>BD</div><span class=logo-text><span class=bd-b>BARGAIN</span><span class=bd-d>DROP</span></span></a></div><a href=settings.html class=back-link>← Back to Settings</a><div class=page-content><div class=page-title>👤 Manage My Account</div><div class=form-card><div class=form-group><label>Full Name</label><input type=text placeholder='Your name' id=name></div><div class=form-group><label>Email Address</label><input type=email placeholder='you@example.com' id=email></div><div class=form-group><label>New Password</label><input type=password placeholder='Leave blank to keep current' id=pw></div><div class=form-group><label>Confirm New Password</label><input type=password placeholder='Re-enter new password' id=cpw></div><button class=save-btn onclick='alert("Account updated!")'>Save Changes</button><div class=danger-zone><h3>Danger Zone</h3><button class=delete-btn onclick='if(confirm("Are you sure you want to delete your account? This cannot be undone."))alert("Account deletion requested")'>Delete Account</button></div></div></div><nav class=bottom-nav><a href=/><svg class=nav-icon viewBox='0 0 24 24'><path d='M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3' stroke=#777 stroke-width=2 fill=none/></svg>Home</a><a href=products.html><svg class=nav-icon viewBox='0 0 24 24'><rect x=3 y=3 width=7 height=7 rx=1 stroke=#777 stroke-width=1.5 fill=none/><rect x=14 y=3 width=7
