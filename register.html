<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Register — Bargain Drop</title>
<style>
:root{--bg:#fff;--fg:#111;--muted:#777;--line:#eee;--red:#e60023;--green:#10b981;--blue:#2563eb}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#f8f8f8;color:var(--fg);min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:20px}
.auth-container{width:100%;max-width:400px;margin-top:30px}
.logo-area{text-align:center;margin-bottom:24px}
.auth-logo-icon{width:56px;height:56px;border-radius:14px;background:linear-gradient(135deg,#e60023,#ff6b81);display:inline-flex;align-items:center;justify-content:center;color:#fff;font-size:1.3rem;font-weight:900}
.auth-logo-text{font-size:1.4rem;font-weight:900;margin-top:8px}
.auth-logo-text .bd-b{background:linear-gradient(135deg,#e60023,#ff4757);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.auth-logo-text .bd-d{color:#111}
.auth-card{background:#fff;border-radius:16px;padding:24px;border:1px solid var(--line)}
.auth-title{font-size:1.1rem;font-weight:800;text-align:center;margin-bottom:20px}
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:.7rem;font-weight:700;margin-bottom:5px;color:var(--muted)}
.form-group input{width:100%;padding:12px 14px;border:1.5px solid var(--line);border-radius:10px;font-size:.8rem;outline:none;transition:border .2s}
.form-group input:focus{border-color:var(--blue)}
.submit-btn{width:100%;padding:13px;background:#111;color:#fff;border:none;border-radius:10px;font-size:.8rem;font-weight:700;cursor:pointer;margin-top:6px;transition:opacity .15s}
.submit-btn:active{opacity:.85}
.divider{display:flex;align-items:center;gap:10px;margin:18px 0;font-size:.65rem;color:var(--muted)}
.divider:before,.divider:after{content:'';flex:1;height:1px;background:var(--line)}
.signin-prompt{text-align:center;font-size:.72rem;color:var(--muted);margin-top:16px}
.signin-prompt a{color:var(--blue);font-weight:700;text-decoration:none}
.error-msg{background:#fce4e4;color:var(--red);padding:10px;border-radius:8px;font-size:.7rem;margin-bottom:14px;display:none}
.terms-text{font-size:.62rem;color:var(--muted);text-align:center;margin-top:12px;line-height:1.4}
.terms-text a{color:var(--blue)}
</style>
</head>
<body>
<div class="auth-container">
  <div class="logo-area">
    <a href="/" style="text-decoration:none"><div class="auth-logo-icon">BD</div></a>
    <div class="auth-logo-text"><span class="bd-b">BARGAIN</span><span class="bd-d">DROP</span></div>
  </div>
  <div class="auth-card">
    <div class="auth-title">Create Account</div>
    <div class="error-msg" id="error-msg"></div>
    <div class="form-group"><label>Full Name</label><input type="text" id="name" placeholder="Your full name" autocomplete="name"></div>
    <div class="form-group"><label>Email Address</label><input type="email" id="email" placeholder="you@example.com" autocomplete="email"></div>
    <div class="form-group"><label>Password</label><input type="password" id="password" placeholder="At least 6 characters" autocomplete="new-password"></div>
    <div class="form-group"><label>Confirm Password</label><input type="password" id="confirm" placeholder="Re-enter password" autocomplete="new-password"></div>
    <button class="submit-btn" onclick="handleRegister()">Create Account</button>
    <div class="terms-text">By creating an account, you agree to our <a href="info/terms.html">Terms &amp; Conditions</a> and <a href="info/privacy.html">Privacy Policy</a>.</div>
    <div class="divider">or continue with</div>
    <div style="display:flex;gap:8px">
      <button style="flex:1;padding:10px;border:1.5px solid var(--line);border-radius:10px;background:#fff;font-size:.72rem;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px">G Google</button>
      <button style="flex:1;padding:10px;border:1.5px solid var(--line);border-radius:10px;background:#fff;font-size:.72rem;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px"> Apple</button>
    </div>
  </div>
  <div class="signin-prompt">Already have an account? <a href="signin.html">Sign in</a></div>
</div>
<script>
function showError(msg){var e=document.getElementById('error-msg');e.textContent=msg;e.style.display='';setTimeout(function(){e.style.display='none'},4000)}
function handleRegister(){
  var name=document.getElementById('name').value.trim();
  var email=document.getElementById('email').value.trim();
  var pw=document.getElementById('password').value;
  var cp=document.getElementById('confirm').value;
  if(!name||!email||!pw){showError('All fields are required');return}
  if(!email.includes('@')){showError('Please enter a valid email address');return}
  if(pw.length<6){showError('Password must be at least 6 characters');return}
  if(pw!==cp){showError('Passwords do not match');return}
  var users=JSON.parse(localStorage.getItem('bd_users')||'{}');
  if(users[email]){showError('An account with this email already exists');return}
  users[email]={name:name,password:pw,created:new Date().toISOString()};
  localStorage.setItem('bd_users',JSON.stringify(users));
  localStorage.setItem('bd_user',JSON.stringify({email:email,name:name}));
  localStorage.setItem('bd_temp_email',email);
  location.href='profile.html';
}
</script>
</body>
</html>
