<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Settings — Bargain Drop</title>
<style>
:root{--bg:#fff;--fg:#111;--muted:#777;--line:#eee;--red:#e60023}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--fg);padding-bottom:80px}
a{color:inherit;text-decoration:none}
.top-bar{display:flex;align-items:center;justify-content:space-between;padding:6px 16px;background:#111;color:#fff;font-size:0.7rem;position:sticky;top:0;z-index:110}
.top-bar a{color:#fff}
.page-header{padding:16px;border-bottom:1px solid var(--line)}
.page-header h1{font-size:1.1rem;font-weight:800}
.section{padding:16px}
.section h3{font-size:0.82rem;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.setting-row{display:flex;align-items:center;justify-content:space-between;padding:14px 0;border-bottom:1px solid var(--line)}
.setting-row .sr-label{font-size:0.78rem;font-weight:600}
.setting-row .sr-value{font-size:0.72rem;color:var(--muted)}
.setting-row .sr-arrow{color:var(--muted)}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--line);display:flex;z-index:120;padding:4px 0}
.bottom-nav a{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:5px;font-size:0.6rem;color:var(--muted);text-decoration:none}
.bottom-nav a.active{color:var(--fg)}
.nav-icon{width:20px;height:20px;flex-shrink:0}
</style>
</head>
<body>
<div class="top-bar"><a href="profile.html">← Profile</a><div>Free $29+</div></div>
<div class="page-header"><h1>⚙️ Settings</h1></div>
<div class="section">
<h3>👤 Account</h3>
<div class="setting-row" onclick="alert('Manage your addresses')"><span class="sr-label">📍 Address Book</span><span class="sr-arrow">→</span></div>
<div class="setting-row" onclick="alert('Manage payment methods')"><span class="sr-label">💳 My Payment Options</span><span class="sr-arrow">→</span></div>
<div class="setting-row" onclick="alert('Manage your account')"><span class="sr-label">🔐 Manage My Account</span><span class="sr-arrow">→</span></div>
<div class="setting-row" onclick="alert('Manage notification preferences')"><span class="sr-label">🔔 Contact Preferences</span><span class="sr-arrow">→</span></div>
</div>
<div class="section">
<h3>ℹ️ My Info</h3>
<div class="setting-row" onclick="alert('Free standard shipping on orders over $29. Express shipping available at checkout. Orders typically ship within 1-3 business days.')"><span class="sr-label">🚚 Shipping Info</span><span class="sr-arrow">→</span></div>
<div class="setting-row" onclick="alert('We accept returns within 30 days of delivery. Items must be unused and in original packaging.')"><span class="sr-label">↩️ Return Policy</span><span class="sr-arrow">→</span></div>
<div class="setting-row" onclick="alert('Refunds are processed within 5-7 business days after we receive your return. Original shipping charges are non-refundable.')"><span class="sr-label">💰 Refund</span><span class="sr-arrow">→</span></div>
<div class="setting-row" onclick="alert('We accept Visa, Mastercard, American Express, PayPal, and Apple Pay.')"><span class="sr-label">🪪 Payment Method</span><span class="sr-arrow">→</span></div>
<div class="setting-row" onclick="alert('By using Bargain Drop, you agree to our terms and conditions. All prices are in USD. We reserve the right to modify these terms at any time.')"><span class="sr-label">📄 Terms & Conditions</span><span class="sr-arrow">→</span></div>
</div>
<nav class="bottom-nav">
<a href="index.html"><svg class="nav-icon" viewBox="0 0 24 24"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3" stroke="#777" stroke-width="2" fill="none"/></svg>Home</a>
<a href="products.html"><svg class="nav-icon" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1" stroke="#777" stroke-width="1.5" fill="none"/><rect x="14" y="3" width="7" height="7" rx="1" stroke="#777" stroke-width="1.5" fill="none"/></svg>Products</a>
<a href="categories.html"><svg class="nav-icon" viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h16" stroke="#777" stroke-width="2"/></svg>Categories</a>
<a href="profile.html"><svg class="nav-icon" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2" stroke="#777" stroke-width="2" fill="none"/><circle cx="12" cy="7" r="4" stroke="#777" stroke-width="2" fill="none"/></svg>Me</a>
</nav>
</body>
</html>
