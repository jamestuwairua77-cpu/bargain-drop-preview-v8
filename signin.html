<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Sign In — Bargain Drop</title>
<style>
:root{--bg:#fff;--fg:#111;--muted:#777;--line:#eee;--red:#e60023;--green:#10b981;--blue:#2563eb}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#f8f8f8;color:var(--fg);min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:20px}
.auth-container{width:100%;max-width:400px;margin-top:40px}
.logo-area{text-align:center;margin-bottom:24px}
.auth-logo-icon{width:56px;height:56px;border-radius:14px;background:linear-gradient(135deg,#e60023,#ff6b81);display:inline-flex;align-items:center;justify-content:center;color:#fff;font-size:1.3rem;font-weight:900}
.auth-logo-text{font-size:1.4rem;font-weight:900;margin-top:8px}
.auth-logo-text .bd-b{background:linear-gradient(135deg,#e60023,#ff4757);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.auth-logo-text .bd-d{color:#111}
.auth-card{background:#fff;border-radius:16px;padding:24px;border:1px solid var(--line)}
.auth-title{font-size:1.1rem;font-weight:800;text-align:center;margin-bottom:20px}
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:.7rem;font-weight:700;margin-bottom:5px;color:var(--muted)}
.form-group input{width:100%;padding:12px 14px;border:1.5px solid var(--line);border-radius:10px;font-size:.8rem;outline:none;transition:border .2s}
.form-group input:focus{border-color:var(--blue)}
.submit-btn{width:100%;padding:13px;background:#111;color:#fff;border:none;border-radius:10px;font-size:.8rem;font-weight:700;cursor:pointer;margin-top:6px;transition:opacity .15s}
.submit-btn:active{opacity:.85}
.forgot-link{text-align:center;margin-top:14px;font-size:.7rem}
.forgot-link a{color:var(--blue);text-decoration:none;font-weight:600}
.divider{display:flex;align-items:center;gap:10px;margin:18px 0;font-size:.65rem;color:var(--muted)}
.divider:before,.divider:after{content:'';flex:1;height:1px;background:var(--line)}
.signup-prompt{text-align:center;font-size:.72rem;color:var(--muted);margin-top:16px}
.signup-prompt a{color:var(--blue);font-weight:700;text-decoration:none}
.error-msg{background:#fce4e4;color:var(--red);padding:10px;border-radius:8px;font-size:.7rem;margin-bottom:14px;display:none}
.success-msg{background:#d1fae5;color:var(--green);padding:10px;border-radius:8px;font-size:.7rem;margin-bottom:14px;display:none}
</style>
</head>
<body>
<div class="auth-container">
  <div class="logo-area">
    <a href="/" style="text-decoration:none"><div class="auth-logo-icon">BD</div></a>
    <div class="auth-logo-text"><span class="bd-b">BARGAIN</span><span class="bd-d">DROP</span></div>
  </div>
  <div class="auth-card">
    <div class="auth-title">Welcome Back</div>
    <div class="error-msg" id="error-msg"></div>
    <div class="form-group"><label>Email Address</label><input type="email" id="email" placeholder="you@example.com" autocomplete="email"></div>
    <div class="form-group"><label>Password</label><input type="password" id="password" placeholder="Enter your password" autocomplete="current-password"></div>
    <button class="submit-btn" onclick="handleSignIn()">Sign In</button>
    <div class="forgot-link"><a href="forgot-password.html">Forgot password?</a></div>
    <div class="divider">or continue with</div>
    <div style="display:flex;gap:8px">
      <button style="flex:1;padding:10px;border:1.5px solid var(--line);border-radius:10px;background:#fff;font-size:.72rem;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px" onclick="socialSignIn('google')">G Google</button>
      <button style="flex:1;padding:10px;border:1.5px solid var(--line);border-radius:10px;background:#fff;font-size:.72rem;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px" onclick="socialSignIn('apple')"> Apple</button>
    </div>
  </div>
  <div class="signup-prompt">Don't have an account? <a href="register.html">Create one</a></div>
</div>
<script>
function showError(msg){var e=document.getElementById('error-msg');e.textContent=msg;e.style.display='';setTimeout(function(){e.style.display='none'},4000)}
function handleSignIn(){
  var email=document.getElementById('email').value.trim();
  var pw=document.getElementById('password').value.trim();
  if(!email||!pw){showError('Please enter your email and password');return}
  if(!email.includes('@')){showError('Please enter a valid email address');return}
  if(pw.length<4){showError('Password must be at least 4 characters');return}
  var users=JSON.parse(localStorage.getItem('bd_users')||'{}');
  if(users[email]&&users[email].password===pw){
    localStorage.setItem('bd_user',JSON.stringify({email:email,name:users[email].name}));
    localStorage.setItem('bd_temp_email',email);
    location.href='profile.html';
  }else{
    showError('Invalid email or password. Please try again.');
  }
}
function socialSignIn(provider){
  alert(provider+' sign-in coming soon! For now, enter any email & password to create an account instantly.');
}
</script>
</body>
</html>
