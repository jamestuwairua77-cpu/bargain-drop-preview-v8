<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Categories — Bargain Drop</title>
<style>
:root{--bg:#fff;--fg:#111;--muted:#777;--line:#eee;--red:#e60023;--accent:#ff2d55}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--fg);padding-bottom:80px}
a{color:inherit;text-decoration:none}
.top-bar{display:flex;align-items:center;justify-content:space-between;padding:6px 16px;background:#111;color:#fff;font-size:0.7rem;position:sticky;top:0;z-index:110}
.top-bar a{color:#fff}
.page-header{padding:16px;border-bottom:1px solid var(--line)}
.page-header h1{font-size:1.1rem;font-weight:800}
.cat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;padding:16px}
.cat-card{display:flex;align-items:center;gap:10px;padding:12px;background:#fafafa;border-radius:12px;border:1px solid var(--line);transition:all .15s}
.cat-card:hover{background:#f0f0f0;border-color:#ddd;transform:translateY(-1px)}
.cat-card-img{width:48px;height:48px;border-radius:12px;background:linear-gradient(135deg,#f5f5f5,#e8e8e8);display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0;font-size:1.5rem}
.cat-card-img img{width:100%;height:100%;object-fit:cover;border-radius:12px}
.cat-card-info{flex:1}
.cat-card-name{font-size:0.75rem;font-weight:600;line-height:1.2}
.cat-card-count{font-size:0.62rem;color:var(--muted);margin-top:2px}
.cat-card-arrow{font-size:0.8rem;color:var(--muted)}
.loading{display:flex;align-items:center;justify-content:center;padding:60px 20px;color:var(--muted);flex-direction:column;gap:12px}
.spinner{width:32px;height:32px;border:3px solid #e5e5e5;border-top-color:#111;border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--line);display:flex;z-index:120;padding:4px 0}
.bottom-nav a{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:5px;font-size:0.6rem;color:var(--muted);text-decoration:none}
.bottom-nav a.active,.bottom-nav a:hover{color:var(--fg)}
.nav-icon{width:20px;height:20px;flex-shrink:0}
@media(min-width:768px){.cat-grid{grid-template-columns:repeat(3,1fr);max-width:960px;margin:0 auto}}
</style>
</head>
<body>
<div class="top-bar"><a href="index.html">← Home</a><div>Free Shipping $29+</div></div>
<div class="page-header"><h1>All Categories</h1></div>
<div class="cat-grid" id="catGrid"><div class="loading" style="grid-column:1/-1"><div class="spinner"></div><p>Loading categories...</p></div></div>
<nav class="bottom-nav">
<a href="index.html"><svg class="nav-icon" viewBox="0 0 24 24"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3" stroke="#777" stroke-width="2" fill="none"/></svg>Home</a>
<a href="products.html"><svg class="nav-icon" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1" stroke="#777" stroke-width="1.5" fill="none"/><rect x="14" y="3" width="7" height="7" rx="1" stroke="#777" stroke-width="1.5" fill="none"/></svg>Products</a>
<a href="categories.html" class="active"><svg class="nav-icon" viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h16" stroke="#777" stroke-width="2"/></svg>Categories</a>
<a href="#"><svg class="nav-icon" viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z" stroke="#777" stroke-width="1.5" fill="none"/></svg>Wishlist</a>
<a href="profile.html"><svg class="nav-icon" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2" stroke="#777" stroke-width="2" fill="none"/><circle cx="12" cy="7" r="4" stroke="#777" stroke-width="2" fill="none"/></svg>Me</a>
</nav>
<script>
(async function(){
try{
var r=await fetch('categories-data.json');
var data=await r.json();
var grid=document.getElementById('catGrid');
grid.innerHTML='';
Object.entries(data).forEach(function(e){
var key=e[0];var cat=e[1];
var img=cat.products&&cat.products[0]&&cat.products[0].image?'<img src="'+cat.products[0].image+'" alt="" loading="lazy" onerror="this.style.display=\'none\';this.parentElement.innerHTML=\''+(cat.emoji||'')+'\'">':'<span>'+(cat.emoji||'')+'</span>';
grid.innerHTML+='<a href="category.html?cat='+encodeURIComponent(key)+'" class="cat-card"><div class="cat-card-img">'+img+'</div><div class="cat-card-info"><div class="cat-card-name">'+key+'</div><div class="cat-card-count">'+cat.total_products+' products • '+(cat.subcategories||[]).length+' subcategories</div></div><span class="cat-card-arrow">→</span></a>';
});
}catch(e){document.getElementById('catGrid').innerHTML='<div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--muted)">Failed to load categories</div>'}
})();
</script>
</body>
</html>
